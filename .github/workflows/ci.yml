name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-server.txt
          python -m pip install pip-audit bandit
      - name: Audit Python dependencies
        run: python -m pip_audit -r requirements-server.txt
      - name: Scan backend security
        run: python -m bandit -r server -ll
      - name: Compile server
        run: python -m compileall -q server
      - name: Run tests
        run: python -m unittest discover -s tests -v

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci --prefix frontend
      - name: Audit frontend dependencies
        run: npm audit --prefix frontend --audit-level=high
      - name: Typecheck
        run: npm --prefix frontend run typecheck
      - name: Build
        run: npm --prefix frontend run build
